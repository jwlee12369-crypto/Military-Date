        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f0f2f0; color: #444; }
        .calendar-title { text-align: center; color: #556b2f; margin-bottom: 30px; font-weight: 800; font-size: 2em; }
        
        .calendar-container { display: flex; flex-direction: column; gap: 40px; align-items: center; }
        
        table { border-collapse: collapse; width: 100%; max-width: 900px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); table-layout: fixed; }
        th { background-color: #78866b; color: white; height: 50px; text-align: center; font-size: 0.9em; letter-spacing: 1px; }
        
        .sun { color: #ff8787; }
        .sat { color: #74c0fc; }
        
        td { border: 1px solid #eee; vertical-align: top; padding: 0; transition: 0.3s; }
        .day-box { padding: 12px; height: 100px; }
        
        .day-link {
            display: block; 
            text-decoration: none; 
            color: inherit;
            height: 100px; 
            padding: 12px;
            transition: all 0.3s ease;
        }
        
        .day-link:hover { 
            background-color: #f9fbf9; 
            transform: translateY(-2px);
            box-shadow: inset 0 0 10px rgba(120, 134, 107, 0.1);
        }

        .date_num { font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 8px; color: #555; }
        
        .event_item { 
            font-size: 0.8em; 
            color: white; 
            background: #a3b18a; 
            padding: 4px 8px; 
            border-radius: 8px; 
            margin-top: 5px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .highlight { background-color: #f1f3ee; }
        .highlight .event_item { background: #d4a373; }

        .month-label { 
            font-size: 1.6em; font-weight: bold; margin-bottom: 15px; width: 100%; max-width: 900px; 
            color: #78866b; border-bottom: 3px solid #a3b18a; padding-bottom: 5px;
        }
    </style>
</head>
