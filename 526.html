<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>종원이의 소중한 기록</title>
    <style>
        /* 밝고 화사한 세이지 그린 & 베이지 테마 */
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f1; 
            color: #444; 
            margin: 0; 
            padding: 40px 20px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1 { 
            color: #556b2f; 
            font-size: 2.2em; 
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        p { color: #78866b; margin-bottom: 40px; font-weight: bold; }

        .video-wrapper { 
            width: 100%; 
            max-width: 800px; /* 영상이 너무 커지지 않도록 최대 너비 설정 */
        }

        .video-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 2px solid #e2e8da;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-5px);
        }

        .video-title {
            padding: 15px;
            background-color: #f9fbf7;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            color: #556b2f;
            text-align: center;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-btn {
            margin-top: 50px;
            padding: 12px 30px;
            background-color: #a3b18a;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(163, 177, 138, 0.4);
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #556b2f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>대망의 수료식 날! 쫑이 기록</h1>
    <p>오늘 준비한 특별한 영상을 확인해보세요!</p>

    <div class="video-wrapper">
        <div class="video-card">
            <div class="video-title">드디어 수료식이야 연서야~!</div>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/vFrALMs5Rgg" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-btn">← 쫑이를 기다리는 연서를 위한 일정표로 돌아가기</a>

</body>
</html>
